name: Build CASTOR-ETC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      # 保留手動觸發的按鈕

jobs:
  # ==========================================
  # 1. 驗證任務 (只要有 push 或 PR 就會自動跑)
  # ==========================================
  test:
    name: 🧪 驗證與測試 (Ubuntu)
    runs-on: ubuntu-latest  # 測試用 Ubuntu 跑最快
    steps:
    - name: 📥 取得程式碼
      uses: actions/checkout@v4

    - name: ⚡ 安裝並設定 uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" 

    - name: 📦 安裝專案依賴
      run: uv sync

    - name: 🧪 執行自動化測試 (Pytest)
      run: uv run pytest

  # ==========================================
  # 2. Windows 打包任務 (只有手動點擊才會跑)
  # ==========================================
  build-windows:
    name: 🏗️ 打包 Windows 版本
    needs: test  # 確保測試通過後才開始打包
    if: github.event_name == 'workflow_dispatch' # 👈 關鍵：只有手動觸發才執行
    runs-on: windows-latest
    steps:
    - name: 📥 取得程式碼
      uses: actions/checkout@v4

    - name: ⚡ 安裝並設定 uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 📦 安裝專案依賴 (過河拆橋)
      run: uv sync --no-dev

    - name: 🏗️ 打包執行檔 (Windows)
      run: uv run pyinstaller --clean --noconfirm build.spec

    - name: 📤 上傳 Windows 產物
      uses: actions/upload-artifact@v4
      with:
        name: CASTOR-ETC-Windows
        path: dist/CASTOR-ETC.exe

  # ==========================================
  # 3. macOS 打包任務 (只有手動點擊才會跑)
  # ==========================================
  build-macos:
    name: 🏗️ 打包 macOS 版本
    needs: test  # 確保測試通過後才開始打包
    if: github.event_name == 'workflow_dispatch' # 👈 關鍵：只有手動觸發才執行
    runs-on: macos-latest
    steps:
    - name: 📥 取得程式碼
      uses: actions/checkout@v4

    - name: ⚡ 安裝並設定 uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 📦 安裝專案依賴 (過河拆橋)
      run: uv sync --no-dev

    - name: 🏗️ 打包執行檔 (macOS)
      run: uv run pyinstaller --clean --noconfirm build.spec

    - name: 🗜️ 壓縮 Mac 應用程式
      run: |
        cd dist
        zip -r CASTOR-ETC-macOS.zip CASTOR-ETC.app

    - name: 📤 上傳 macOS 產物
      uses: actions/upload-artifact@v4
      with:
        name: CASTOR-ETC-macOS
        path: dist/CASTOR-ETC-macOS.zip